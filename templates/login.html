{% extends "base.html" %}

{% block content %}
<div class="relative flex min-h-[80vh] items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <!-- Decorative Blobs -->
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[20%] left-[20%] w-72 h-72 bg-primary-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-[30%] right-[20%] w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
    </div>

    <div class="w-full max-w-md space-y-8 glass-card p-10 rounded-[2.5rem] shadow-2xl border border-white/60">
        <div class="text-center">
            <div class="mx-auto w-16 h-16 bg-gradient-to-br from-primary-500 to-purple-600 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg mb-6 transform -rotate-3">
                👋
            </div>
            <h2 class="text-3xl font-extrabold text-secondary-900 tracking-tight">Welcome Back</h2>
            <p class="mt-2 text-sm text-secondary-600">Please sign in to your account</p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm font-medium">
            {{ error }}
        </div>
        {% endif %}

        <form class="mt-8 space-y-6" action="/login" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-secondary-700 mb-1 pl-1">Email address</label>
                    <input id="email" name="email" type="email" autocomplete="email" required class="relative block w-full px-4 py-3 placeholder-secondary-400 border border-secondary-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-secondary-900 bg-white/80 transition-shadow sm:text-sm" placeholder="you@example.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-secondary-700 mb-1 pl-1">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required class="relative block w-full px-4 py-3 placeholder-secondary-400 border border-secondary-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-secondary-900 bg-white/80 transition-shadow sm:text-sm" placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between pl-1">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-secondary-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-secondary-700">Remember me</label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-primary-600 hover:text-primary-500 transition-colors">Forgot password?</a>
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-2xl text-white bg-primary-600 hover:bg-primary-700 hover:shadow-lg hover:shadow-primary-500/30 transition-all transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 mt-6">
                    Sign In to Dashboard
                </button>
            </div>
        </form>
        
        <div class="text-center mt-6">
            <p class="text-sm text-secondary-600">
                Don't have an account? 
                <a href="/register" class="font-bold text-primary-600 hover:text-primary-500 transition-colors">Create one now</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
