 {% extends "base.html" %}
 {%block alert %}    <style>
.alert{
    padding:12px;
    margin:10px;
    border-radius:6px;
    font-weight:500;
}

.success{
    background-color:#d4edda;
    color:#155724;
    border:1px solid #c3e6cb;
}

.error{
    background-color:#f8d7da;
    color:#721c24;
    border:1px solid #f5c6cb;
}
</style>

   {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert {{ category }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}{%endblock%}
 {% block content%}




{% endblock%}
