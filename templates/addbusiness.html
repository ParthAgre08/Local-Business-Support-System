{% extends 'base2.html' %}

{% block content %}
<div class="addbusiness-wrapper">
    <div class="addbusiness-card">
        <h2 class="addbusiness-title">Add New Business</h2>
        
        <form action="/addbusiness" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="name">Business Name</label>
                <div class="input-wrapper">
                    <input type="text" id="name" name="name" class="form-control" placeholder="Enter business name" required>
                </div>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <div class="input-wrapper">
                    <select id="category_select" name="category" class="form-control" required onchange="toggleCustomCategory()">
                        <option value="" disabled selected>Select a category</option>
                        <option value="Food & Home-Made Products">🍽️ Food & Home-Made Products</option>
                        <option value="Electronics">💻 Electronics</option>
                        <option value="Services">🔧 Services</option>
                        <option value="Retail">🛍️ Retail</option>
                        <option value="Fashion">👗 Fashion</option>
                        <option value="Beauty">✨ Beauty</option>
                        <option value="Automobile">🚗 Automobile</option>
                        <option value="Home Services">🏠 Home Services</option>
                        <option value="Agriculture">🚜 Agriculture</option>
                        <option value="Pharmacy">💊 Pharmacy</option>
                        <option value="Other">Other (Customize)</option>
                    </select>
                    <input type="text" id="custom_category" name="custom_category" class="form-control" placeholder="Enter custom category" style="display: none; margin-top: 10px;">
                </div>
            </div>

            <div class="form-group" id="subcategory_group" style="display: none;">
                <label for="subcategory">Subcategory</label>
                <div class="input-wrapper">
                    <select id="subcategory_select" name="subcategory" class="form-control">
                        <option value="" selected>Select a subcategory</option>
                    </select>
                </div>
            </div>

            <script>
                const subcategoryMapping = {
                    'Food & Home-Made Products': ['Cakes and Bakery', 'Tiffin / Mess', 'Snacks / Papad / Pickles'],
                    'Electronics': ['Mobile Repair', 'Laptop Repair'],
                    'Services': ['Electrician', 'Plumber', 'Tutor'],
                    'Retail': ['Grocery', 'Stationery'],
                    'Fashion': ['Tailor', 'Boutique'],
                    'Beauty': ['Male Salon', 'Female Parlour'],
                    'Automobile': ['Bike Repair', 'Car Repair'],
                    'Home Services': ['Carpenter', 'Painter'],
                    'Agriculture': ['Dairy', 'Vegetables']
                };

                function toggleCustomCategory() {
                    var selectElement = document.getElementById('category_select');
                    var customInput = document.getElementById('custom_category');
                    var subGroup = document.getElementById('subcategory_group');
                    var subSelect = document.getElementById('subcategory_select');
                    
                    if (selectElement.value === 'Other') {
                        customInput.style.display = 'block';
                        customInput.required = true;
                        customInput.name = 'category';
                        selectElement.name = 'category_ignore';
                        subGroup.style.display = 'none';
                        subSelect.innerHTML = '<option value="" selected>Select a subcategory</option>';
                    } else {
                        customInput.style.display = 'none';
                        customInput.required = false;
                        customInput.name = 'custom_category';
                        selectElement.name = 'category';
                        
                        // Populate subcategories
                        const cat = selectElement.value;
                        if (cat && subcategoryMapping[cat]) {
                            subGroup.style.display = 'block';
                            let html = '<option value="" selected>Select a subcategory</option>';
                            subcategoryMapping[cat].forEach(sub => {
                                html += `<option value="${sub}">${sub}</option>`;
                            });
                            subSelect.innerHTML = html;
                        } else {
                            subGroup.style.display = 'none';
                            subSelect.innerHTML = '<option value="" selected>Select a subcategory</option>';
                        }
                    }
                }
            </script>

            <div class="form-group">
                <label for="location">Location</label>
                <div class="input-wrapper">
                    <input type="text" id="location" name="location" class="form-control" placeholder="Enter business location/address" required>
                </div>
            </div>

            <div class="form-group time-group">
                <div style="flex: 1;">
                    <label for="starting_time">Opening Time</label>
                    <div class="input-wrapper">
                        <input type="time" id="starting_time" name="starting_time" class="form-control" required style="width: 100%;">
                    </div>
                </div>
                <div style="flex: 1;">
                    <label for="closing_time">Closing Time</label>
                    <div class="input-wrapper">
                        <input type="time" id="closing_time" name="closing_time" class="form-control" required style="width: 100%;">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <div class="input-wrapper">
                    <textarea id="description" name="description" class="form-control" rows="4" placeholder="Describe your business..." required></textarea>
                </div>
            </div>

            <div class="form-group">
                <label for="image">Business Image</label>
                <div class="input-wrapper">
                    <input type="file" id="image" name="image" class="form-control" accept="image/*" required>
                </div>
            </div>

            <button type="submit" class="addbusiness-submit-btn">Add Business</button>
        </form>
    </div>
</div>
{% endblock %}
