{% extends "base.html" %}

{% block content %}
<div class="relative flex min-h-[80vh] items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <!-- Decorative Blobs -->
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[20%] right-[20%] w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute bottom-[20%] left-[20%] w-72 h-72 bg-primary-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
    </div>

    <div class="w-full max-w-md space-y-8 glass-card p-10 rounded-[2.5rem] shadow-2xl border border-white/60">
        <div class="text-center">
            <div class="mx-auto w-16 h-16 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg mb-6 transform rotate-3">
                ✨
            </div>
            <h2 class="text-3xl font-extrabold text-secondary-900 tracking-tight">Create Account</h2>
            <p class="mt-2 text-sm text-secondary-600">Join the Local Business Hub community</p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm font-medium">
            {{ error }}
        </div>
        {% endif %}

        <form class="mt-8 space-y-6" action="/register" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-secondary-700 mb-1 pl-1">Username</label>
                    <input id="username" name="username" type="text" required class="relative block w-full px-4 py-3 placeholder-secondary-400 border border-secondary-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-secondary-900 bg-white/80 transition-shadow sm:text-sm" placeholder="cooluser_123">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-secondary-700 mb-1 pl-1">Email address</label>
                    <input id="email" name="email" type="email" autocomplete="email" required class="relative block w-full px-4 py-3 placeholder-secondary-400 border border-secondary-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-secondary-900 bg-white/80 transition-shadow sm:text-sm" placeholder="you@example.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-secondary-700 mb-1 pl-1">Password</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" required class="relative block w-full px-4 py-3 placeholder-secondary-400 border border-secondary-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-secondary-900 bg-white/80 transition-shadow sm:text-sm" placeholder="••••••••">
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-2xl text-white bg-primary-600 hover:bg-primary-700 hover:shadow-lg hover:shadow-primary-500/30 transition-all transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 mt-6">
                    Sign Up
                </button>
            </div>
        </form>
        
        <div class="text-center mt-6">
            <p class="text-sm text-secondary-600">
                Already have an account? 
                <a href="/login" class="font-bold text-primary-600 hover:text-primary-500 transition-colors">Sign in here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
